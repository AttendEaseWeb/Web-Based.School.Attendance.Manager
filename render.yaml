services:
  - type: web
    name: markit-app
    env: node
    region: singapore
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: markit-db
          property: connectionString

databases:
  - name: markit-db
    databaseName: markit
    plan: free
